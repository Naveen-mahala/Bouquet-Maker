<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 400" width="150" height="400">
  <defs>
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#607d8b" />
      <stop offset="100%" stop-color="#37474f" />
    </linearGradient>
    <radialGradient id="leafGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b0bec5" />
      <stop offset="75%" stop-color="#78909c" />
      <stop offset="100%" stop-color="#546e7a" />
    </radialGradient>
  </defs>
  
  <!-- Stem -->
  <path d="M 75 40 L 75 400" fill="none" stroke="url(#stemGrad)" stroke-width="4.5" stroke-linecap="round" />
  
  <!-- Large circular leaves -->
  <g>
    
      <g transform="translate(75, 70) rotate(-25)">
        <path d="M 0 0 L -24 0" stroke="url(#stemGrad)" stroke-width="3" />
        <circle cx="-24" cy="0" r="32" fill="url(#leafGrad)" stroke="#37474f" stroke-width="1.5" />
        <path d="M -24 -30 Q -29 0 -24 30" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" />
      </g>
      
      <g transform="translate(75, 115) rotate(25)">
        <path d="M 0 0 L 24 0" stroke="url(#stemGrad)" stroke-width="3" />
        <circle cx="24" cy="0" r="30.5" fill="url(#leafGrad)" stroke="#37474f" stroke-width="1.5" />
        <path d="M 24 -28.5 Q 29 0 24 28.5" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" />
      </g>
      
      <g transform="translate(75, 160) rotate(-25)">
        <path d="M 0 0 L -24 0" stroke="url(#stemGrad)" stroke-width="3" />
        <circle cx="-24" cy="0" r="29" fill="url(#leafGrad)" stroke="#37474f" stroke-width="1.5" />
        <path d="M -24 -27 Q -29 0 -24 27" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" />
      </g>
      
      <g transform="translate(75, 205) rotate(25)">
        <path d="M 0 0 L 24 0" stroke="url(#stemGrad)" stroke-width="3" />
        <circle cx="24" cy="0" r="27.5" fill="url(#leafGrad)" stroke="#37474f" stroke-width="1.5" />
        <path d="M 24 -25.5 Q 29 0 24 25.5" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" />
      </g>
      
      <g transform="translate(75, 250) rotate(-25)">
        <path d="M 0 0 L -24 0" stroke="url(#stemGrad)" stroke-width="3" />
        <circle cx="-24" cy="0" r="26" fill="url(#leafGrad)" stroke="#37474f" stroke-width="1.5" />
        <path d="M -24 -24 Q -29 0 -24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" />
      </g>
      
      <g transform="translate(75, 295) rotate(25)">
        <path d="M 0 0 L 24 0" stroke="url(#stemGrad)" stroke-width="3" />
        <circle cx="24" cy="0" r="24.5" fill="url(#leafGrad)" stroke="#37474f" stroke-width="1.5" />
        <path d="M 24 -22.5 Q 29 0 24 22.5" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" />
      </g>
      
      <g transform="translate(75, 340) rotate(-25)">
        <path d="M 0 0 L -24 0" stroke="url(#stemGrad)" stroke-width="3" />
        <circle cx="-24" cy="0" r="23" fill="url(#leafGrad)" stroke="#37474f" stroke-width="1.5" />
        <path d="M -24 -21 Q -29 0 -24 21" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" />
      </g>
      
    
    <!-- Top single leaf -->
    <circle cx="75" cy="40" r="22" fill="url(#leafGrad)" stroke="#37474f" stroke-width="1.5" />
  </g>
</svg>