    <path d="M 0 0 C -18 -18 -15 -50 0 -42 C 15 -50 18 -18 0 0" fill="#ff4081" opacity="0.95" transform="rotate(54)" />
    
    <path d="M 0 0 C -18 -18 -15 -50 0 -42 C 15 -50 18 -18 0 0" fill="#ff4081" opacity="0.95" transform="rotate(90)" />
    
    <path d="M 0 0 C -18 -18 -15 -50 0 -42 C 15 -50 18 -18 0 0" fill="#ff4081" opacity="0.95" transform="rotate(126)" />
    
    <path d="M 0 0 C -18 -18 -15 -50 0 -42 C 15 -50 18 -18 0 0" fill="#ff4081" opacity="0.95" transform="rotate(162)" />
    
    <path d="M 0 0 C -18 -18 -15 -50 0 -42 C 15 -50 18 -18 0 0" fill="#ff4081" opacity="0.95" transform="rotate(198)" />
    
