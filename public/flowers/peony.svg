    <path d="M 0 0 C -25 -25 -20 -65 0 -55 C 20 -65 25 -25 0 0" fill="url(#peonyGrad)" opacity="0.85" transform="rotate(30)" />
    
    <path d="M 0 0 C -25 -25 -20 -65 0 -55 C 20 -65 25 -25 0 0" fill="url(#peonyGrad)" opacity="0.85" transform="rotate(60)" />
    
    <path d="M 0 0 C -25 -25 -20 -65 0 -55 C 20 -65 25 -25 0 0" fill="url(#peonyGrad)" opacity="0.85" transform="rotate(90)" />
    
    <path d="M 0 0 C -25 -25 -20 -65 0 -55 C 20 -65 25 -25 0 0" fill="url(#peonyGrad)" opacity="0.85" transform="rotate(120)" />
    
    <path d="M 0 0 C -25 -25 -20 -65 0 -55 C 20 -65 25 -25 0 0" fill="url(#peonyGrad)" opacity="0.85" transform="rotate(150)" />
    
    <path d="M 0 0 C -25 -25 -20 -65 0 -55 C 20 -65 25 -25 0 0" fill="url(#peonyGrad)" opacity="0.85" transform="rotate(180)" />
    
    <path d="M 0 0 C -25 -25 -20 -65 0 -55 C 20 -65 25 -25 0 0" fill="url(#peonyGrad)" opacity="0.85" transform="rotate(210)" />
    
    <path d="M 0 0 C -25 -25 -20 -65 0 -55 C 20 -65 25 -25 0 0" fill="url(#peonyGrad)" opacity="0.85" transform="rotate(240)" />
    
    <path d="M 0 0 C -25 -25 -20 -65 0 -55 C 20 -65 25 -25 0 0" fill="url(#peonyGrad)" opacity="0.85" transform="rotate(270)" />
    
    <path d="M 0 0 C -25 -25 -20 -65 0 -55 C 20 -65 25 -25 0 0" fill="url(#peonyGrad)" opacity="0.85" transform="rotate(300)" />
    
    <path d="M 0 0 C -25 -25 -20 -65 0 -55 C 20 -65 25 -25 0 0" fill="url(#peonyGrad)" opacity="0.85" transform="rotate(330)" />
    
    
