    <path d="M 0 0 C -12 -12 -10 -35 0 -30 C 10 -35 12 -12 0 0" fill="#ff8da1" transform="rotate(0)" />
    
    <path d="M 0 0 C -12 -12 -10 -35 0 -30 C 10 -35 12 -12 0 0" fill="#ff8da1" transform="rotate(45)" />
    
    <path d="M 0 0 C -12 -12 -10 -35 0 -30 C 10 -35 12 -12 0 0" fill="#ff8da1" transform="rotate(90)" />
    
    <path d="M 0 0 C -12 -12 -10 -35 0 -30 C 10 -35 12 -12 0 0" fill="#ff8da1" transform="rotate(135)" />
    
    <path d="M 0 0 C -12 -12 -10 -35 0 -30 C 10 -35 12 -12 0 0" fill="#ff8da1" transform="rotate(180)" />
    
    <path d="M 0 0 C -12 -12 -10 -35 0 -30 C 10 -35 12 -12 0 0" fill="#ff8da1" transform="rotate(225)" />
    
    <path d="M 0 0 C -12 -12 -10 -35 0 -30 C 10 -35 12 -12 0 0" fill="#ff8da1" transform="rotate(270)" />
    
    <path d="M 0 0 C -12 -12 -10 -35 0 -30 C 10 -35 12 -12 0 0" fill="#ff8da1" transform="rotate(315)" />
    
    
    <!-- Golden Core points -->
    <circle cx="0" cy="0" r="8" fill="#ffd700" opacity="0.9" />
    <circle cx="-3" cy="-3" r="2" fill="#ff8f00" />
    <circle cx="3" cy="2" r="1.5" fill="#ff8f00" />
