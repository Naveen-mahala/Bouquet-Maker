<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="200" height="400">
  <defs>
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#558b2f" />
      <stop offset="100%" stop-color="#2e7d32" />
    </linearGradient>
    <linearGradient id="daisyPetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f5f5f5" />
    </linearGradient>
  </defs>
  
  <!-- Stem -->
  <path d="M 100 120 L 100 400" fill="none" stroke="url(#stemGrad)" stroke-width="5" stroke-linecap="round" />
  
  <!-- Bloom -->
  <g transform="translate(100, 110)">
    <!-- Radiating White Petals (18 Petals) -->
    
    <path d="M 0 0 C -8 -20 -6 -65 0 -70 C 6 -65 8 -20 0 0" fill="url(#daisyPetal)" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(0)" />
    
    <path d="M 0 0 C -8 -20 -6 -65 0 -70 C 6 -65 8 -20 0 0" fill="url(#daisyPetal)" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(20)" />
    
    <path d="M 0 0 C -8 -20 -6 -65 0 -70 C 6 -65 8 -20 0 0" fill="url(#daisyPetal)" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(40)" />
    
    <path d="M 0 0 C -8 -20 -6 -65 0 -70 C 6 -65 8 -20 0 0" fill="url(#daisyPetal)" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(60)" />
    
    <path d="M 0 0 C -8 -20 -6 -65 0 -70 C 6 -65 8 -20 0 0" fill="url(#daisyPetal)" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(80)" />
    
    <path d="M 0 0 C -8 -20 -6 -65 0 -70 C 6 -65 8 -20 0 0" fill="url(#daisyPetal)" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(100)" />
    
    <path d="M 0 0 C -8 -20 -6 -65 0 -70 C 6 -65 8 -20 0 0" fill="url(#daisyPetal)" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(120)" />
    
    <path d="M 0 0 C -8 -20 -6 -65 0 -70 C 6 -65 8 -20 0 0" fill="url(#daisyPetal)" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(140)" />
    
    <path d="M 0 0 C -8 -20 -6 -65 0 -70 C 6 -65 8 -20 0 0" fill="url(#daisyPetal)" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(160)" />
    
    <path d="M 0 0 C -8 -20 -6 -65 0 -70 C 6 -65 8 -20 0 0" fill="url(#daisyPetal)" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(180)" />
    
    <path d="M 0 0 C -8 -20 -6 -65 0 -70 C 6 -65 8 -20 0 0" fill="url(#daisyPetal)" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(200)" />
    
    <path d="M 0 0 C -8 -20 -6 -65 0 -70 C 6 -65 8 -20 0 0" fill="url(#daisyPetal)" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(220)" />
    
    <path d="M 0 0 C -8 -20 -6 -65 0 -70 C 6 -65 8 -20 0 0" fill="url(#daisyPetal)" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(240)" />
    
    <path d="M 0 0 C -8 -20 -6 -65 0 -70 C 6 -65 8 -20 0 0" fill="url(#daisyPetal)" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(260)" />
    
    <path d="M 0 0 C -8 -20 -6 -65 0 -70 C 6 -65 8 -20 0 0" fill="url(#daisyPetal)" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(280)" />
    
    <path d="M 0 0 C -8 -20 -6 -65 0 -70 C 6 -65 8 -20 0 0" fill="url(#daisyPetal)" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(300)" />
    
    <path d="M 0 0 C -8 -20 -6 -65 0 -70 C 6 -65 8 -20 0 0" fill="url(#daisyPetal)" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(320)" />
    
    <path d="M 0 0 C -8 -20 -6 -65 0 -70 C 6 -65 8 -20 0 0" fill="url(#daisyPetal)" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(340)" />
    
    
    <!-- Yellow Disc Center -->
    <circle cx="0" cy="0" r="20" fill="#ffca28" stroke="#f57f17" stroke-width="1.5" />
    <!-- Seed Dots -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="#f57f17" stroke-width="1" stroke-dasharray="1, 3" />
  </g>
</svg>